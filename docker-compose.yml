services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: asset-management-db
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./AssetManagementSystem
      dockerfile: Dockerfile
    image: asset-management-system-backend:latest
    container_name: asset-management-system-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AssetManagementDBCOnnection=Server=db;Database=AssetManagementDB;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./AssetManagementSystem-Client
      dockerfile: Dockerfile
    image: asset-management-system-client:latest
    container_name: asset-management-system-client
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqldata:
