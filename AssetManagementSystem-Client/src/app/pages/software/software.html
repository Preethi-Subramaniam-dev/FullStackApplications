
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
  <ng-container matColumnDef="softwareLicenseID">
    <th mat-header-cell *matHeaderCellDef>Software Id</th>
    <td mat-cell *matCellDef="let element">{{ element.softwareLicenseID }}</td>
  </ng-container>

  <ng-container matColumnDef="softwareName">
    <th mat-header-cell *matHeaderCellDef>Software Name</th>
    <td mat-cell *matCellDef="let element">{{ element.softwareName }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  <tr class="mat-row" *matNoDataRow>
    <td class="mat-cell" [attr.colspan]="displayedColumns.length">No software found.</td>
  </tr>
</table>
